<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>AquaTech | Cadastro</title>

  <script src="./js/sessao.js"></script>

  <link rel="stylesheet" href="./css/estilo.css" />
  <link rel="icon" href="./assets/icon/favicon2.ico" />
  <link rel="preconnect" href="https://fonts.gstatic.com" />
</head>

<body>
  <!--header inicio-->
  <div class="header">
    <div class="container">
      <div class="logo">
        <img src="./assets/imgs/main/logo2.png" alt="">
        <h1 class="titulo">pkmnHub lite</h1>
      </div>
      <ul class="navbar">
        <li class="agora">
          <a href="index.html">Inicial</a>
        </li>
        <li>|</li>
        <li>
          <a href="login.html">Login</a>
        </li>
        <li>
          <a href="cadastro.html">Cadastro</a>
        </li>
      </ul>
    </div>
  </div>
  <!--header fim-->

      <div class="row" style="width: 100%; gap: 0; padding: 0 5%; background-color: #1a1c1f;">
    <div class="login formulario" style="width: 50%;">
      <div class="campos">
        <h3 class="titulo-formulario">Comece sua Jornada</h3>

        <div class="campo">
          <span>Nome:</span>
          <input id="nome_input" type="text" placeholder="Seu nome" />
        </div>
        <div class="campo">
          <span>E-mail:</span>
          <input id="email_input" type="text" placeholder="meuemail@provedor.com" />
        </div>
        <div class="row">
          <div class="campo">
            <span>Senha:</span>
            <input id="senha_input" type="password" placeholder="******" />
          </div>
          <div class="campo">
            <span>Confirmação da Senha:</span>
            <input id="confirmacao_senha_input" type="password" placeholder="******" />
          </div>
        </div>
          <div class="row" style="margin-bottom: 6px;">
            <img src="./assets/imgs/profilePics/1.webp" onclick="numFotoPerfil = 1">
            <img src="./assets/imgs/profilePics/2.webp" onclick="numFotoPerfil = 2">
            <img src="./assets/imgs/profilePics/3.webp" onclick="numFotoPerfil = 3">
            <img src="./assets/imgs/profilePics/4.webp" onclick="numFotoPerfil = 4">
            <img src="./assets/imgs/profilePics/5.webp" onclick="numFotoPerfil = 5">
            <img src="./assets/imgs/profilePics/6.webp" onclick="numFotoPerfil = 6">
          </div>
        <button class="campos-button" style="margin-top: 6px;" onclick="cadastrar()">Cadastrar</button>
            <span id="mensagem_erro">Confirmação da Senha:</span>
      </div>
    </div>

    <div class="wrapper-imagem">
      <div class="imagem-login">
        <h1>Domine o jogo, <br> <span  class="ballet">Coleciona</span> lendas!</h1>
      </div>
    </div>
  </div>

  <!--footer inicio-->
  <div class="footer">
    <div class="container">
      <div class="logo">
        <img src="./assets/imgs/main/logo2.png" alt="">
        <h1 class="titulo">pkmnHub lite</h1>
      </div>
      <span>© 2026 pkmnHub. Todos os direitos reservados.</span>
    </div>
  </div>
  <!--footer fim-->
</body>

</html>

<script>
        let numFotoPerfil = 0;

  function cadastrar() {
    //Recupere o valor da nova input pelo nome do id
    // Agora vá para o método fetch logo abaixo
        let username = nome_input.value;
        let email = email_input.value;
        let senha = senha_input.value;
        let confirmacao = confirmacao_senha_input.value;

    // Verificando se há algum campo em branco
    if (
      username == "" ||
      email == "" ||
      senha == "" ||
      confirmacao == ""
    ) {
      mensagem_erro.innerHTML =
        "(Mensagem de erro para todos os campos em branco)";

      return false;
    } 

    // Enviando o valor da nova input
    fetch("/usuarios/cadastrar", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify({
        // crie um atributo que recebe o valor recuperado aqui
        // Agora vá para o arquivo routes/usuario.js
                usernameServer: username,
                emailServer: email,
                senhaServer: senha,
                confirmacaoServer: confirmacao,
                numFotoPerfilServer: numFotoPerfil
      }),
    })
      .then(function (resposta) {
        console.log("resposta: ", resposta);

        if (resposta.ok) {
          mensagem_erro.innerHTML =
            "Cadastro realizado com sucesso! Redirecionando para tela de Login...";

          setTimeout(() => {
            window.location = "login.html";
          }, "500");

          limparFormulario();
          finalizarAguardar();
        } else {
          throw "Houve um erro ao tentar realizar o cadastro!";
        }
      })
      .catch(function (resposta) {
        console.log(`#ERRO: ${resposta}`);
      });

    return false;
  }

  // Listando empresas cadastradas 
  function listar() {
    fetch("/empresas/listar", {
      method: "GET",
    })
      .then(function (resposta) {
        resposta.json().then((empresas) => {
          empresas.forEach((empresa) => {
            listaEmpresasCadastradas.push(empresa);

            console.log("listaEmpresasCadastradas")
            console.log(listaEmpresasCadastradas[0].codigo_ativacao)
          });
        });
      })
      .catch(function (resposta) {
        console.log(`#ERRO: ${resposta}`);
      });
  }

</script>

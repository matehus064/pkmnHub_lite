<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>pkmnHub_lite | Login</title>

    <script src="./js/sessao.js"></script>

    <link rel="stylesheet" href="./css/estilo.css" />
    <link rel="icon" href="./assets/imgs/main/logo2.png">
</head>

<body onload="listar()">
    <!--header inicio-->
    <div class="header">
        <div class="container">
            <div class="logo">
                <img src="./assets/imgs/main/logo2.png" alt="">
                <h1 class="titulo">pkmnHub lite</h1>
            </div>
            <ul class="navbar">
                <li class="agora">
                    <a href="index.html">Inicial</a>
                </li>

                <li>|</li>
                <li>
                    <a href="login.html">Login</a>
                </li>
                <li>
                    <a href="cadastro.html">Cadastro</a>
                </li>
            </ul>
        </div>
    </div>
    <!--header fim-->

    <div class="row" style="width: 100%; gap: 0; padding: 0 5%; background-color: #1a1c1f;">
        <div class="wrapper-imagem">
            <div class="imagem-login imagem-login--login" style="align-items: flex-start; justify-content: flex-end;">
                <h1>Domine o jogo, <br> <span class="ballet">Coleciona</span> lendas!</h1>
            </div>
        </div>

        <div class="login formulario" style="width: 50%;">
            <div class="campos">
                <h3 class="titulo-formulario">Continue sua Jornada</h3>
                <div class="campo">
                    <span>E-mail:</span>
                    <input id="email_input" type="text" placeholder="Login">
                </div>
                <div class="campo">
                    <span>Senha:</span>
                    <input id="senha_input" type="password" placeholder="******">
                </div>
                <button class="campos-button" style="margin-top: 6px;" onclick="entrar()">Entrar</button>
            </div>
        </div>
    </div>

    <!--footer inicio-->
    <div class="footer">
        <div class="container">
            <div class="logo">
                <img src="./assets/imgs/main/logo2.png" alt="">
                <h1 class="titulo">pkmnHub lite</h1>
            </div>
            <span>© 2026 pkmnHub. Todos os direitos reservados.</span>
        </div>
    </div>
    <!--footer fim-->
</body>

</html>

<script>


    function entrar() {

        var emailVar = email_input.value;
        var senhaVar = senha_input.value;

        if (emailVar == "" || senhaVar == "") {
            cardErro.style.display = "block"
            mensagem_erro.innerHTML = "(Mensagem de erro para todos os campos em branco)";
            return false;
        }

        console.log("FORM LOGIN: ", emailVar);
        console.log("FORM SENHA: ", senhaVar);

        fetch("/usuarios/autenticar", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                emailServer: emailVar,
                senhaServer: senhaVar
            })
        }).then(function (resposta) {
            console.log("ESTOU NO THEN DO entrar()!")

            if (resposta.ok) {
                console.log(resposta);

                resposta.json().then(json => {
                    console.log(json);
                    console.log(JSON.stringify(json));
                    sessionStorage.EMAIL_USUARIO = json.emailServer;
                    sessionStorage.NOME_USUARIO = json.usernameServer;
                    sessionStorage.FOTO_PERFIL = json.numFotoPerfilServer;
                    sessionStorage.ID_USER = json.id;

                    setTimeout(function () {
                        window.location = "./dashboard/dashboard.html";
                    }, 1000); // apenas para exibir o loading

                });

            } else {

                console.log("Houve um erro ao tentar realizar o login!");

                resposta.text().then(texto => {
                    console.error(texto);
                    finalizarAguardar(texto);
                });
            }

        }).catch(function (erro) {
            console.log(erro);
        })

        return false;
    }
</script>
